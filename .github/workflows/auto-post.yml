name: Auto-Post Phase 1 — Generate Drafts (10am SGT)

on:
  schedule:
    # Every day at 02:00 UTC = 10:00am SGT (UTC+8)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate & save as draft only, skip Typefully (always true for scheduled runs)'
        type: boolean
        default: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate drafts
        run: |
          # Schedule trigger always uses dry_run=true so posts land as reviewable drafts.
          # workflow_dispatch respects the input (default true).
          DRY_RUN=${{ inputs.dry_run != '' && inputs.dry_run || 'true' }}
          curl -sf -X POST "${{ secrets.APP_BASE_URL }}/api/automation/weekly-post?dry_run=${DRY_RUN}" \
            -H "X-Automation-Key: ${{ secrets.AUTOMATION_SECRET }}" \
            -H "Content-Type: application/json"
