name: Weekly X Drafts — Generate 7 posts (Sunday 9am SGT)

on:
  schedule:
    # Every Sunday at 01:00 UTC = 09:00am SGT (UTC+8)
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate 7 weekly X draft posts
        run: |
          curl -sf -X POST "${{ secrets.APP_BASE_URL }}/api/automation/generate-weekly-drafts" \
            -H "X-Automation-Key: ${{ secrets.AUTOMATION_SECRET }}" \
            -H "Content-Type: application/json"
