name: Auto-Post Phase 2 — Push to Typefully (manual only)

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Push today's scheduled posts to Typefully
        run: |
          curl -sf -X POST "${{ secrets.APP_BASE_URL }}/api/automation/push-pending" \
            -H "X-Automation-Key: ${{ secrets.AUTOMATION_SECRET }}" \
            -H "Content-Type: application/json"
